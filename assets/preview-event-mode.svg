<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="24" fill="#0F172A"/>
  <rect x="36" y="36" width="1128" height="648" rx="20" fill="#111827" stroke="#334155"/>
  <rect x="72" y="76" width="1056" height="48" rx="12" fill="#1E293B"/>
  <text x="100" y="108" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="24" font-weight="700">事件模式验证视图</text>
  <rect x="72" y="156" width="500" height="468" rx="18" fill="#020617" stroke="#1E293B"/>
  <text x="100" y="198" fill="#93C5FD" font-family="Courier New, monospace" font-size="22">openclaw channels status</text>
  <text x="100" y="248" fill="#A7F3D0" font-family="Courier New, monospace" font-size="20">Feishu main: enabled, configured, running</text>
  <text x="100" y="286" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">received message from ou_xxx in oc_xxx</text>
  <text x="100" y="322" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">dispatching to agent (...feishu:group:oc_xxx)</text>
  <text x="100" y="358" fill="#FDE68A" font-family="Courier New, monospace" font-size="18">如果用户说没看到回复，检查是否发成 post 线程回复</text>
  <rect x="612" y="156" width="516" height="468" rx="18" fill="#F8FAFC"/>
  <rect x="652" y="204" width="236" height="56" rx="18" fill="#DBEAFE"/>
  <text x="690" y="239" fill="#1E3A8A" font-family="Arial, sans-serif" font-size="26" font-weight="700">用户：你好</text>
  <rect x="716" y="308" width="332" height="204" rx="20" fill="#E0F2FE" stroke="#7DD3FC"/>
  <text x="742" y="352" fill="#0C4A6E" font-family="Arial, sans-serif" font-size="24" font-weight="700">机器人回复（post）</text>
  <text x="742" y="398" fill="#155E75" font-family="Arial, sans-serif" font-size="20">算是“同一个系统”，但不是“同一个层级”。</text>
  <text x="742" y="434" fill="#155E75" font-family="Arial, sans-serif" font-size="20">更准确地说：Claw 是运行环境，我是当前会话。</text>
  <text x="742" y="470" fill="#155E75" font-family="Arial, sans-serif" font-size="20">这类回复可能挂在原消息下面，而不是普通气泡。</text>
</svg>
