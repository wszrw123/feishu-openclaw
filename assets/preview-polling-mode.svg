<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="24" fill="#020617"/>
  <rect x="40" y="40" width="1120" height="640" rx="24" fill="#0F172A" stroke="#334155"/>
  <text x="80" y="110" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="30" font-weight="700">轮询兜底模式</text>
  <text x="80" y="154" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">当飞书事件链路不稳定时，直接读取群消息列表，再把回复回发到群里。</text>
  <rect x="80" y="210" width="1040" height="390" rx="20" fill="#111827"/>
  <rect x="120" y="272" width="200" height="84" rx="18" fill="#1D4ED8"/>
  <text x="170" y="323" fill="#EFF6FF" font-family="Arial, sans-serif" font-size="26" font-weight="700">飞书群消息</text>
  <rect x="390" y="272" width="200" height="84" rx="18" fill="#059669"/>
  <text x="435" y="323" fill="#ECFDF5" font-family="Arial, sans-serif" font-size="26" font-weight="700">轮询读取</text>
  <rect x="660" y="272" width="200" height="84" rx="18" fill="#7C3AED"/>
  <text x="688" y="323" fill="#F5F3FF" font-family="Arial, sans-serif" font-size="26" font-weight="700">OpenClaw Agent</text>
  <rect x="930" y="272" width="150" height="84" rx="18" fill="#EA580C"/>
  <text x="956" y="323" fill="#FFF7ED" font-family="Arial, sans-serif" font-size="26" font-weight="700">回发飞书</text>
  <path d="M320 314H390" stroke="#93C5FD" stroke-width="6" stroke-linecap="round"/>
  <path d="M590 314H660" stroke="#86EFAC" stroke-width="6" stroke-linecap="round"/>
  <path d="M860 314H930" stroke="#C4B5FD" stroke-width="6" stroke-linecap="round"/>
  <text x="120" y="430" fill="#E2E8F0" font-family="Courier New, monospace" font-size="22">GET /im/v1/messages</text>
  <text x="120" y="470" fill="#E2E8F0" font-family="Courier New, monospace" font-size="22">去重 message_id</text>
  <text x="120" y="510" fill="#E2E8F0" font-family="Courier New, monospace" font-size="22">忽略 sender_type=app</text>
  <text x="120" y="550" fill="#E2E8F0" font-family="Courier New, monospace" font-size="22">POST /im/v1/messages</text>
</svg>
